<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Knowledge Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fafaf9;
      color: #292524;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
    }
    .offline-card {
      text-align: center;
      max-width: 400px;
    }
    .offline-icon {
      color: #a8a29e;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #78716c;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="offline-card">
    <svg class="offline-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a10 10 0 0 1 10 10c0 3.1-1.4 5.9-3.6 7.7"/>
      <path d="M7.5 19.5A10 10 0 0 1 5 12"/>
      <path d="M2 12a10 10 0 0 1 2.5-6.5"/>
      <path d="M17 12a5 5 0 0 1-2 4"/>
      <path d="M12 17a5 5 0 0 1-2.5-1.5"/>
      <line x1="2" y1="2" x2="22" y2="22"/>
    </svg>
    <h1>You're offline</h1>
    <p>Connect to the internet and try again. Cached pages are available for browsing.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
